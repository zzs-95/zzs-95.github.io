<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 笙态AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      margin: 20px;
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo h1 {
      font-size: 28px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo p {
      color: #666;
      margin-top: 8px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e1e1e1;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    .btn-google {
      background: white;
      border: 2px solid #e1e1e1;
      color: #333;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-google:hover {
      border-color: #667eea;
      color: #667eea;
    }
    .divider {
      text-align: center;
      margin: 24px 0;
      color: #999;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #e1e1e1;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .switch {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
    .switch a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }
    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    .loading {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e1e1e1;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .guest-btn {
      background: transparent;
      border: 2px solid #667eea;
      color: #667eea;
      margin-top: 12px;
    }
    .guest-btn:hover {
      background: #667eea;
      color: white;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div id="loginForm">
      <div class="logo">
        <h1>💫 笙态AI</h1>
        <p>智能助手，随时为你服务</p>
      </div>
      
      <div id="errorMsg" class="error"></div>
      
      <div class="form-group">
        <label>邮箱地址</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="至少6位字符" required>
      </div>
      
      <button class="btn btn-primary" onclick="signIn()">登录</button>
      
      <div class="divider">或</div>
      
      <button class="btn btn-google" onclick="signInWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        使用 Google 登录
      </button>
      
      <button class="btn guest-btn" onclick="guestLogin()">
        👤 游客登录（不保存历史）
      </button>
      
      <div class="switch">
        还没有账号？ <a href="#" onclick="showRegister(); return false;">立即注册</a>
      </div>
    </div>
    
    <div id="registerForm" style="display:none;">
      <div class="logo">
        <h1>💫 笙态AI</h1>
        <p>创建你的账号</p>
      </div>
      
      <div class="form-group">
        <label>邮箱地址</label>
        <input type="email" id="regEmail" placeholder="your@email.com" required>
      </div>
      
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="regPassword" placeholder="至少6位字符" required>
      </div>
      
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" id="regConfirm" placeholder="再次输入密码" required>
      </div>
      
      <button class="btn btn-primary" onclick="register()">注册</button>
      
      <div class="switch">
        已有账号？ <a href="#" onclick="showLogin(); return false;">立即登录</a>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <script>
    // Firebase 配置 - 需要替换为你自己的配置
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    
    // 初始化 Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // 显示错误
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }
    
    // 清除错误
    function clearError() {
      document.getElementById('errorMsg').style.display = 'none';
    }
    
    // 邮箱登录
    async function signIn() {
      clearError();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (!email || !password) {
        showError('请填写邮箱和密码');
        return;
      }
      
      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = 'chat.html';
      } catch (error) {
        console.error(error);
        showError(errorMessage(error.code));
      }
    }
    
    // 注册
    async function register() {
      clearError();
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;
      
      if (!email || !password || !confirm) {
        showError('请填写所有字段');
        return;
      }
      
      if (password !== confirm) {
        showError('两次密码输入不一致');
        return;
      }
      
      if (password.length < 6) {
        showError('密码至少需要6位');
        return;
      }
      
      try {
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        // 创建用户文档
        await db.collection('users').doc(userCredential.user.uid).set({
          email: email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          isVip: false,
          vipExpire: null,
          totalChats: 0
        });
        window.location.href = 'chat.html';
      } catch (error) {
        console.error(error);
        showError(errorMessage(error.code));
      }
    }
    
    // Google 登录
    async function signInWithGoogle() {
      clearError();
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const result = await auth.signInWithPopup(provider);
        
        // 如果是新用户，创建文档
        const userRef = db.collection('users').doc(result.user.uid);
        const doc = await userRef.get();
        if (!doc.exists) {
          await userRef.set({
            email: result.user.email,
            name: result.user.displayName,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            isVip: false,
            vipExpire: null,
            totalChats: 0
          });
        }
        
        window.location.href = 'chat.html';
      } catch (error) {
        console.error(error);
        showError(errorMessage(error.code));
      }
    }
    
    // 游客登录
    function guestLogin() {
      // 存储游客标记
      localStorage.setItem('isGuest', 'true');
      window.location.href = 'chat.html';
    }
    
    // 错误消息翻译
    function errorMessage(code) {
      const messages = {
        'auth/invalid-email': '邮箱格式不正确',
        'auth/user-disabled': '该账号已被禁用',
        'auth/user-not-found': '账号不存在',
        'auth/wrong-password': '密码错误',
        'auth/email-already-in-use': '该邮箱已被注册',
        'auth/weak-password': '密码强度太弱',
        'auth/network-request-failed': '网络错误，请检查网络连接'
      };
      return messages[code] || '登录失败，请重试';
    }
    
    // 切换登录/注册表单
    function showRegister() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
    }
    
    function showLogin() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
    }
    
    // 检查是否已登录
    auth.onAuthStateChanged(user => {
      if (user) {
        window.location.href = 'chat.html';
      }
    });
  </script>
</body>
</html>
